<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 220" fill="none">
  <defs>
    <filter id="nbShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feOffset dx="14" dy="14" in="SourceAlpha" result="off" />
      <feColorMatrix
        in="off"
        type="matrix"
        values="0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 1 0"
        result="shadow"
      />
      <feMerge>
