<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <filter id="nbShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feOffset dx="18" dy="18" in="SourceAlpha" result="off"/>
      <feColorMatrix in="off" type="matrix"
        values="0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 1 0" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .stroke { stroke: #0a0a0a; stroke-width: 18; stroke-linejoin: miter; stroke-linecap: square; }
      .heavy { font-family: ui-sans-serif, system-ui, -apple-system, "Geist", Arial, sans-serif; font-weight: 900; }
    </style>
  </defs>

  <!-- Badge -->
  <g filter="url(#nbShadow)">
    <rect x="76" y="86" width="360" height="360" rx="0" class="stroke" fill="#F7F2E6"/>

    <!-- Acid corner -->
    <path d="M76 86H226V156C226 167.046 217.046 176 206 176H76V86Z" class="stroke" fill="#B6FF3B"/>

    <!-- Pull-up bar -->
    <g transform="translate(140 150)">
      <rect x="0" y="0" width="232" height="22" class="stroke" fill="#F7F2E6"/>
      <rect x="14" y="18" width="22" height="90" class="stroke" fill="#F7F2E6"/>
      <rect x="196" y="18" width="22" height="90" class="stroke" fill="#F7F2E6"/>
    </g>

    <!-- 100 -->
    <g transform="translate(0 0)">
      <text x="256" y="352" text-anchor="middle" class="heavy" font-size="168" fill="#0a0a0a" letter-spacing="-10">100</text>
    </g>

    <!-- Small label -->
    <rect x="106" y="380" width="300" height="48" class="stroke" fill="#FF6A2E"/>
    <text x="256" y="414" text-anchor="middle" class="heavy" font-size="26" fill="#0a0a0a" letter-spacing="2">!"</text>
  </g>
</svg>

